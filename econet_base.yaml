---
substitutions:
  # Safe defaults (device yaml can override)
  econet_update_interval: 10s
  econet_alarm_update_interval: 30s
  econet_alarm_history_update_interval: 60s
  econet_config_update_interval: 300s
  mcu_connected_timeout: 30s

  # Econet module address (your “src” address)
  wifi_module_address: "0x340"

  # Optional default destination (device/package can override)
  econet_dst_address: "0x0000"

# IMPORTANT:
# - NO external_components here (device yaml owns it)
# - NO uart here (device yaml owns it)
# - NO wifi/logger/ota/web_server here (device yaml owns them)

econet:
  id: econet_id
  uart_id: econet_uart
  update_interval: ${econet_update_interval}

  src_address: ${wifi_module_address}
  # leave 0x0000 unless you set it in the TLWH package or device yaml
  dst_address: ${econet_dst_address}

  mcu_connected_timeout: ${mcu_connected_timeout}
  request_mod_update_intervals:
    1: ${econet_update_interval}
    2: ${econet_alarm_update_interval}
    3: ${econet_alarm_history_update_interval}
    4: ${econet_config_update_interval}


  mcu_connected_binary_sensor:
    name: "Microcontroller Connected"

sensor:
  - platform: econet
    name: "Active Alerts"
    id: alarm_count
    sensor_datapoint: ALRMALRT
    request_mod: 2
    accuracy_decimals: 0
    icon: "mdi:alert"
    state_class: measurement

text_sensor:
  - platform: econet
    name: "Alarm 1"
    id: alarm_1
    sensor_datapoint: ALARM_01
    request_mod: 2
    icon: "mdi:alert"
    entity_category: diagnostic

  - platform: econet
    name: "Alarm 2"
    id: alarm_2
    sensor_datapoint: ALARM_02
    request_mod: 2
    icon: "mdi:alert"
    entity_category: diagnostic

  - platform: econet
    name: "Alarm 3"
    id: alarm_3
    sensor_datapoint: ALARM_03
    request_mod: 2
    icon: "mdi:alert"
    entity_category: diagnostic

  - platform: econet
    name: "Alarm 4"
    id: alarm_4
    sensor_datapoint: ALARM_04
    request_mod: 2
    icon: "mdi:alert"
    entity_category: diagnostic

  - platform: econet
    name: "Alarm History 1"
    id: alarm_history_1
    sensor_datapoint: ALARMH01
    request_mod: 3
    request_once: true
    icon: "mdi:alert"
    entity_category: diagnostic

  - platform: econet
    name: "Alarm History 2"
    id: alarm_history_2
    sensor_datapoint: ALARMH02
    request_mod: 3
    request_once: true
    icon: "mdi:alert"
    entity_category: diagnostic

  - platform: econet
    name: "Software Version Number"
    id: sw_version
    sensor_datapoint: SW_VERSN
    request_mod: 4
    request_once: true
    icon: "mdi:information-box"
    entity_category: diagnostic

switch:
  - platform: econet
    name: "Beep On Alarm"
    id: alarm_beep
    switch_datapoint: ALRMBEEP
    request_mod: 4
    icon: "mdi:alarm-note"
    entity_category: config

  - platform: econet
    name: "Screen Adjustment Lock"
    id: screen_lock
    switch_datapoint: SCRNLOCK
    request_mod: 4
    icon: "mdi:gesture-tap-button"
    entity_category: config

  - platform: econet
    name: "Screen Unit in °C"
    id: display_unit
    switch_datapoint: DISPUNIT
    request_mod: 4
    icon: "mdi:temperature-celsius"
    entity_category: config

  - platform: econet
    id: resetdev
    switch_datapoint: RESETDEV
    request_mod: none
    internal: true

  - platform: econet
    id: alreset
    switch_datapoint: ALRESET
    request_mod: none
    internal: true

  - platform: econet
    id: alhisclr
    switch_datapoint: ALHISCLR
    request_mod: none
    internal: true

button:
  - platform: template
    name: "Restart Microcontroller"
    id: restart_mcu
    icon: "mdi:restart"
    entity_category: config
    on_press:
      - switch.turn_on: resetdev
      - delay: 1s
      - switch.turn_off: resetdev

  - platform: template
    name: "Alarm Reset"
    id: alarm_reset
    icon: "mdi:restart-alert"
    entity_category: config
    on_press:
      - switch.turn_on: alreset
      - delay: 1s
      - switch.turn_off: alreset

  - platform: template
    name: "Alarm History Reset"
    id: alarm_history_reset
    icon: "mdi:restart-alert"
    entity_category: config
    on_press:
      - switch.turn_on: alhisclr
      - delay: 1s
      - switch.turn_off: alhisclr
