title: High-Res Bridge
path: high_res_bridge
icon: mdi:video-high-definition
badges: []

# Shared advanced-camera-card config — applied to every card via YAML anchor.
# Changes from original fragment:
#   - camera_entity removed (was pointing to a non-existent _unified entity)
#   - reolink.media_resolution: high  (was low)
#   - image.refresh_seconds: 5        (was 1 — too aggressive across 15 cameras)
x-card-config: &card_config
  dependencies:
    all_cameras: false
    cameras: []
  triggers:
    motion: false
    occupancy: false
    entities:
      - events
      - clips
      - snapshots
  engine: auto
  frigate:
    client_id: frigate
  motioneye:
    images:
      directory_pattern: '%Y-%m-%d'
      file_pattern: '%H-%M-%S'
    movies:
      directory_pattern: '%Y-%m-%d'
      file_pattern: '%H-%M-%S'
  reolink:
    media_resolution: high
  live_provider: webrtc-card
  image:
    mode: auto
    refresh_seconds: 5
  ptz:
    r2c_delay_between_calls_seconds: 0.5
    c2r_delay_between_calls_seconds: 0.2
  proxy:
    live: auto
    media: auto
    dynamic: true
    ssl_verification: auto
    ssl_ciphers: auto
  always_error_if_entity_unavailable: false
  webrtc_card:
    ui: true

cards:
  - type: entities
    title: Location
    show_header_toggle: false
    entities:
      - entity: input_select.cam_view_area
        name: Area

  # ==========================================================
  # ALL
  # ==========================================================
  - type: conditional
    conditions:
      - entity: input_select.cam_view_area
        state: "All"
    card:
      type: custom:advanced-camera-card
      <<: *card_config
      live:
        display:
          mode: grid
          grid_columns: 3
      cameras:
        - camera_entity: camera.front_door_camera_main
          name: Front Door Camera
          triggers:
            entities:
              - entity: binary_sensor.wyze_cam_front_door_camera_motion

        - camera_entity: camera.courtyard_doorbell_fluent
