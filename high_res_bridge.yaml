title: High-Res Bridge
path: high_res_bridge
icon: mdi:video-high-definition
badges: []

cards:
  - type: entities
    title: Location
    show_header_toggle: false
    entities:
      - entity: input_select.cam_view_area
        name: Area

  # ==========================================================
  # ALL
  # ==========================================================
  - type: conditional
    conditions:
      - entity: input_select.cam_view_area
        state: "All"
    card:
      type: custom:advanced-camera-card
      live:
        display:
          mode: grid
          grid_columns: 3
      cameras:
        - camera_entity: camera.front_door_camera_main
          name: Front Door Camera
          live_provider: webrtc-card
          webrtc_card: { ui: true }

        - camera_entity: camera.courtyard_doorbell_fluent
          name: Courtyard Doorbell
          live_provider: webrtc-card
          webrtc_card: { ui: true }

        - camera_entity: camera.backyard_doorbell_fluent
          name: Backyard Doorbell
          live_provider: webrtc-card
          webrtc_card: { ui: true }

        - camera_entity: camera.garage_outside_doorbell_fluent
          name: Garage Doorbell
          live_provider: webrtc-card
          webrtc_card: { ui: true }

        - camera_entity: camera.garage_outside_camera_fluent
          name: Garage Outside Camera
          live_provider: webrtc-card
          webrtc_card: { ui: true }

        - camera_entity: camera.eufy_garage_camera_1_main
          name: Garage Camera (Interior)
          live_provider: webrtc-card
          webrtc_card: { ui: true }

        - camera_entity: camera.kitchen_camera_1_main
          name: Kitchen Camera 1
          live_provider: webrtc-card
          webrtc_card: { ui: true }

        - camera_entity: camera.kitchen_camera_2_main
          name: Kitchen Camera 2
          live_provider: webrtc-card
          webrtc_card: { ui: true }

        - camera_entity: camera.living_room_camera_main
          name: Living Room Camera
