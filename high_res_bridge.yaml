          webrtc_card: { ui: true }

        - camera_entity: camera.hallway_camera_1_main
          name: Hallway Camera 1
          live_provider: webrtc-card
          webrtc_card: { ui: true }

        - camera_entity: camera.hallway_camera_2_main
          name: Hallway Camera 2
          live_provider: webrtc-card
          webrtc_card: { ui: true }

        - camera_entity: camera.master_bedroom_camera_1_main
          name: Master Bedroom Camera
          live_provider: webrtc-card
          webrtc_card: { ui: true }

        - camera_entity: camera.master_bathroom_camera_1_main
          name: Master Bath Camera 1
