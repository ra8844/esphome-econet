  name: master_bathroom_camera_1_main
  input: rtsp://192.168.5.87:8554/master_bathroom_camera_1_main

- platform: ffmpeg
  name: master_bathroom_camera_2_main
  input: rtsp://192.168.5.87:8554/master_bathroom_camera_2_main

