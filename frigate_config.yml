version: 0.17-0

mqtt:
  enabled: true
  host: 192.168.1.182
  port: 1883
  user: snassar
  password: Egyptian1975

detectors:
  apple_silicon:
    type: zmq
    endpoint: tcp://host.docker.internal:5555

model:
  model_type: yolo-generic
  width: 640
  height: 640
  input_tensor: nchw
  input_dtype: float
  path: /config/model_cache/yolo.onnx
  labelmap_path: /labelmap/coco-80.txt

ffmpeg:
  input_args: preset-rtsp-restream

objects:
  track:
    - person
    - car
    - cat
    - dog

record:
  enabled: false

snapshots:
  enabled: true

cameras:
  # -------------------------------------------------------
  # Wyze cameras — via go2rtc on Mac Mini
  # -------------------------------------------------------

  living_room_camera:
    ffmpeg:
      inputs:
        - path: rtsp://192.168.1.85:8554/living_room_camera_main
          roles: [ detect, record ]
    detect:
      width: 640
      height: 360
      fps: 5

  front_door_camera:
