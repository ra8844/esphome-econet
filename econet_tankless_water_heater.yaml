---
# TLWH entities only. No external_components, no uart, no wifi, no logger.

packages:
  econet: !include econet_base.yaml

# IMPORTANT: set the tankless controller destination address here
substitutions:
  econet_dst_address: "0x10C0"

climate:
  - platform: econet
    id: econet_climate
    name: "${friendly_name} Control"
    icon: "mdi:water-boiler"
    visual:
      min_temperature: "115 °F"
      max_temperature: "125 °F"
      temperature_step:
        target_temperature: "1.0 °F"
        current_temperature: "0.1 °F"
    current_temperature_datapoint: TEMP_OUT
    target_temperature_datapoint: WHTRSETP
    mode_datapoint: WHTRENAB
    modes:
      0: "OFF"
      1: "HEAT"

sensor:
  - platform: econet
    name: "Temperature In"
    id: temp_in
    sensor_datapoint: TEMP__IN
    unit_of_measurement: "°F"
    accuracy_decimals: 1
    device_class: temperature
    state_class: measurement
    entity_category: diagnostic
    request_mod: 1

  - platform: econet
    name: "Temperature Out"
    id: temp_out
    sensor_datapoint: TEMP_OUT
    unit_of_measurement: "°F"
    accuracy_decimals: 1
    device_class: temperature
    state_class: measurement
    entity_category: diagnostic
    request_mod: 1

  - platform: econet
    name: "Water Used"
    id: water_used
    sensor_datapoint: WTR_USED
    unit_of_measurement: "gal"
    accuracy_decimals: 1
    device_class: water
    state_class: total_increasing
    entity_category: diagnostic
    request_mod: 2

  - platform: econet
    name: "Ignition Cycles"
    id: ignition_cycles
    sensor_datapoint: IGNCYCLS
    accuracy_decimals: 0
    entity_category: diagnostic
    icon: "mdi:heating-coil"
    request_mod: 2

# Only remove these if they exist in econet_base.yaml with these IDs.
switch:
  - id: !remove alarm_beep
  - id: !remove screen_lock