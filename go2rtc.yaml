# go2rtc configuration — Mac Mini M1 (192.168.1.85)
# Live file location: /Users/sn/docker/go2rtc.yaml
# Last updated: 2026-03-25
#
# go2rtc runs as root LaunchDaemon: /Library/LaunchDaemons/com.go2rtc.plist
# PATH includes /opt/homebrew/bin (required for ffmpeg: sources)
# Web UI / API: http://192.168.1.85:1984
# RTSP rebroadcast: rtsp://192.168.1.85:8554/<stream_name>
#
# Source types used:
#   wyze://     — Wyze P2P direct connection
#   rtsp://     — Direct RTSP (Reolink, August doorbell, Eufy)
#
# Audio transcoding: ffmpeg:<stream>#audio=opus or #audio=aac
#   Wyze streams are transcoded once in go2rtc for downstream consumers.
#   Synology-specific Wyze variants use AAC instead of Opus.
#
# Keepalive: /Library/LaunchDaemons/com.go2rtc.keepalive.plist runs
#   ~/go2rtc-keepalive.sh as a system daemon using localhost go2rtc endpoints.
#   This avoids breakage when the Mac Mini LAN IP changes and survives reboots
#   without requiring an interactive macOS login.

log:
  format: color
  level: info
  output: stdout
  time: UNIXMS

rtsp:
  listen: :8554
  default_query: video&audio&transport=tcp
  fix_timestamps: true
  drop_corrupted: true
  queue_size: 128

webrtc:
  listen: :8555/tcp
  ice_servers:
    - urls:
        - stun:stun.l.google.com:19302
  allow_local_candidates: true

ffmpeg:
  bin: /opt/homebrew/bin/ffmpeg
  h264_annexb: true

api:
  force_profile_level_id: 42001f
  snapshot:
    enabled: true

probe:
  timeout: 3s
  limit: 4

onvif:
  port: ":8000"
  probe: false

streams:

