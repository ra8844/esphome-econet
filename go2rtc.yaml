# go2rtc configuration — Mac Mini M1 (192.168.1.85)
# Live file location: /Users/sn/docker/go2rtc.yaml
# Last updated: 2026-04-08
#
# go2rtc runs as user LaunchAgent: ~/Library/LaunchAgents/com.go2rtc.plist
# PATH includes /opt/homebrew/bin (required for ffmpeg: sources)
# Web UI / API: http://192.168.1.85:1984
# RTSP rebroadcast: rtsp://192.168.1.85:8554/<stream_name>
#
# Architecture:
#   Hipcam (8)   — go2rtc RTSP rebroadcast (main /11, sub /12)
#                  Scrypted: RTSP plugin → go2rtc main+sub
#                  Frigate (Mac Mini Docker): go2rtc sub for detect, main for record
#                  Motion: Frigate → MQTT → dummy switch → HKSV
#   Wyze (2)     — go2rtc wyze:// P2P → RTSP rebroadcast
#                  192.168.5.62  = Living Room Camera (HL_CAM3P)
#                  192.168.5.177 = Front Door Camera  (HL_PAN3)
#   Eufy (1)     — direct RTSP → go2rtc → Scrypted RTSP plugin
#                  192.168.5.85 (static DHCP)
#                  Motion: Frigate → MQTT → dummy switch → HKSV
#   August (1)   — ON HOLD (device unreachable)
#
#
# Keepalive: ~/go2rtc-keepalive.sh keeps persistent streams warm.

log:
  format: color
  level: info
  output: stdout
  time: UNIXMS

rtsp:
  listen: :8554
  default_query: video&audio
  fix_timestamps: true
  drop_corrupted: true
  queue_size: 64

webrtc:
  listen: :8555/tcp
  ice_servers:
    - urls:
        - stun:stun.l.google.com:19302
  allow_local_candidates: true

ffmpeg:
  bin: /opt/homebrew/bin/ffmpeg
  h264_annexb: true

api:
  force_profile_level_id: 42001f
  snapshot:
    enabled: true

probe:
  timeout: 3s
  limit: 4

onvif:
  port: ":8000"
  probe: false

streams:

