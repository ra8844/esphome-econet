# go2rtc configuration — Mac Mini M1 (192.168.5.87)
# Live file location: /Users/sn/docker/go2rtc.yaml
# Last updated: 2026-03-25
#
# go2rtc runs as root LaunchDaemon: /Library/LaunchDaemons/com.go2rtc.plist
# PATH includes /opt/homebrew/bin (required for ffmpeg: sources)
# Web UI / API: http://192.168.5.87:1984
# RTSP rebroadcast: rtsp://192.168.5.87:8554/<stream_name>
#
# Source types used:
#   onvif://    — ONVIF discovery → RTSP (cameras with working ONVIF implementation)
#   ffmpeg:rtsp://...#video=copy#audio=copy
#               — Direct RTSP via ffmpeg (fixes bad SDP from camera firmware bugs,
#                 and handles cameras where audio/video track order is reversed)
#   wyze://     — Wyze P2P direct connection
#   rtsp://     — Direct RTSP (sub streams, August doorbell, Eufy)
#
# Audio transcoding: ffmpeg:<stream>#audio=opus
#   All Hipcam and Wyze cameras output PCMA/G.711 or PCMU — go2rtc transcodes
#   once to Opus for HA and Scrypted. No duplicate transcoding downstream.
#
# Keepalive: ~/go2rtc-keepalive.sh (LaunchAgent) maintains persistent ffmpeg
#   connections to all 10 Hipcam + Wyze streams so cameras stay awake.

log:
  format: color
  level: info
  output: stdout
  time: UNIXMS

rtsp:
  listen: :8554
  default_query: video&audio&transport=tcp
  fix_timestamps: true
  drop_corrupted: true
  queue_size: 128

webrtc:
  listen: :8555/tcp
  ice_servers:
    - urls:
        - stun:stun.l.google.com:19302
  allow_local_candidates: true

ffmpeg:
  bin: /opt/homebrew/bin/ffmpeg
  h264_annexb: true

api:
  force_profile_level_id: 42001f
  snapshot:
    enabled: true

probe:
  timeout: 3s
  limit: 4

onvif:
  port: ":8000"
  probe: false

streams:

  # -------------------------------------------------------
